<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{{ app_title }}</title>
  <link rel="stylesheet" href="{{ static_url('style.css') }}" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="page-index">
  {% set page_fox = fox.fox_sitting_front or fox.fox_pic or fox.fox_peek or fox.fox_side if fox is defined else '' %}
  <main class="page index-page">
    <section class="empty empty-with-fox">
      {% if page_fox %}<img class="library-empty-fox-img" src="{{ page_fox }}" alt="Лисичка" data-fox>{% endif %}
      <h1>{{ app_title }}</h1>
      {% if error %}<p>{{ error }}</p>{% else %}<p>Библиотека временно недоступна. Попробуйте обновить страницу.</p>{% endif %}
      <a class="primary-read-button" href="/library">Перейти в библиотеку</a>
    </section>
  </main>
  <script>window.ZEFIRKI_FOX = {{ fox | default({}) | tojson }};</script>
  <script src="{{ static_url('settings.js') }}"></script>
</body>
</html>
