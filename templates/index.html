<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{ app_title }}</title>

  <link rel="stylesheet" href="/static/style.css" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
  <main class="page">
    <section class="card">
      <div class="fox">🦊</div>

      <h1>{{ app_title }}</h1>

      <p class="subtitle">
        Закрытая читалка переводов для подписчиков Telegram-канала.
      </p>

      <button id="mainButton" class="button">
        Открыть библиотеку
      </button>

      <pre id="debug" class="debug"></pre>
    </section>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;

    if (tg) {
      tg.ready();
      tg.expand();

      document.body.style.background = tg.themeParams.bg_color || "#f7efe7";

      const user = tg.initDataUnsafe?.user;

      document.getElementById("debug").textContent = user
        ? `Telegram user: ${user.first_name || ""} @${user.username || ""}\nID: ${user.id}`
        : "Открыто не из Telegram или пользователь не передан.";

      tg.MainButton.setText("Открыть библиотеку");
      tg.MainButton.show();

      tg.MainButton.onClick(() => {
        alert("Следующим шагом тут будет каталог новелл.");
      });
    } else {
      document.getElementById("debug").textContent =
        "Это веб-версия. В Telegram Mini App данные пользователя появятся автоматически.";
    }

    document.getElementById("mainButton").addEventListener("click", () => {
      alert("Пока это тестовая страница. Дальше добавим библиотеку.");
    });
  </script>
</body>
</html>
