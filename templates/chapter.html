<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{ chapter.title }} — {{ app_title }}</title>

  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
  <main class="page page-top">
    <article class="reader-layout chapter-layout">
      <a class="back-link" href="/novel/{{ chapter.novels.slug }}">← {{ chapter.novels.title }}</a>

      <h1>{{ chapter.title }}</h1>

      <p class="subtitle">
        Глава {{ chapter.chapter_no }} · Уровень доступа: {{ chapter.access_level }}
      </p>

      {% if telegraph_content %}
        <section class="chapter-content">
          {{ telegraph_content.content_html | safe }}
        </section>
      {% else %}
        <div class="empty">
          Для этой главы пока не указан текст.
        </div>
      {% endif %}
    </article>
  </main>

  <script src="/static/settings.js"></script>
</body>
</html>
